name: CI - Validação

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Build
        run: |
          echo "🔧 Buildando projeto..."
          sleep 2

       - name: Testes
         run: |
         echo "🧪 Rodando testes..."
         sleep 2
         echo "❌ Simulando erro"
         exit 1